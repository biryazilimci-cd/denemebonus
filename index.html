            width: 100%;
            max-width: 360px;
            position: relative;
            overflow: hidden;
            animation: cardFloat 5s ease-in-out infinite;
        }

        @keyframes cardFloat {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        /* Glowing top border */
        .hero-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--crimson), var(--primary-light), var(--crimson), transparent);
            animation: borderGlow 3s linear infinite;
        }

        @keyframes borderGlow {
            0% {
                background-position: 0% 50%;
            }

            100% {
                background-position: 200% 50%;
            }
        }

        /* Corner decoration */
        .hero-card::after {
            content: '◆';
            position: absolute;
            bottom: 16px;
            right: 20px;
            color: rgba(192, 57, 43, 0.15);
            font-size: 3rem;
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            position: relative;
            z-index: 1;
        }

        .card-logo {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: 1.5rem;
            color: var(--ivory);
            letter-spacing: -0.5px;
        }

        .card-badge {
            background: rgba(34, 197, 94, 0.12);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: var(--green);
            font-size: 0.68rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 2px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-family: 'Barlow Condensed', sans-serif;
        }

        .card-rating {
            text-align: center;
            margin-bottom: 28px;
            position: relative;
            z-index: 1;
            border-top: 1px solid rgba(245, 240, 232, 0.06);
            border-bottom: 1px solid rgba(245, 240, 232, 0.06);
            padding: 20px 0;
        }

        .stars {
            font-size: 1.3rem;
            letter-spacing: 3px;
            color: var(--primary);
        }

        .rating-num {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            font-weight: 900;
            color: var(--ivory);
        }

        .rating-max {
            font-size: 1rem;
            color: var(--ivory-dim);
        }

        .rating-label {
            font-size: 0.72rem;
            color: var(--ivory-dim);
            margin-top: 4px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-family: 'Barlow Condensed', sans-serif;
        }

        .card-features {
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            z-index: 1;
        }

        .card-feature {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.85rem;
            color: var(--ivory-dim);
            font-weight: 400;
        }

        .feature-icon {
            width: 28px;
            height: 28px;
            background: rgba(192, 57, 43, 0.12);
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.78rem;
            flex-shrink: 0;
            border: 1px solid rgba(192, 57, 43, 0.2);
        }

        /* ===== SECTION COMMON ===== */
        section {
            position: relative;
            z-index: 1;
        }

        .section-header {
            text-align: center;
            margin-bottom: 56px;
        }

        .section-tag {
            display: inline-block;
            color: var(--crimson);
            font-size: 0.7rem;
            font-weight: 700;
            padding: 0 0 8px;
            margin-bottom: 12px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            font-family: 'Barlow Condensed', sans-serif;
            border-bottom: 1px solid rgba(192, 57, 43, 0.4);
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 3.5vw, 2.8rem);
            font-weight: 900;
            margin-bottom: 16px;
            line-height: 1.2;
            color: var(--ivory);
        }

        .section-desc {
            color: var(--ivory-dim);
            font-size: 0.95rem;
            max-width: 560px;
            margin: 0 auto;
            font-weight: 300;
        }

        /* ===== TRUST BAND ===== */
        .trust-band {
            background: var(--ink-2);
            border-top: 1px solid rgba(192, 57, 43, 0.25);
            border-bottom: 1px solid rgba(192, 57, 43, 0.25);
            padding: 24px 20px;
        }

        .trust-band-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 36px;
            flex-wrap: wrap;
        }

        .trust-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--ivory-dim);
            white-space: nowrap;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-family: 'Barlow Condensed', sans-serif;
            opacity: 0;
            animation: trustReveal 0.5s ease forwards;
        }

        .trust-item:nth-child(1) {
            animation-delay: 0.1s;
        }

        .trust-item:nth-child(2) {
            animation-delay: 0.2s;
        }

        .trust-item:nth-child(3) {
            animation-delay: 0.3s;
        }

        .trust-item:nth-child(4) {
            animation-delay: 0.4s;
        }

        .trust-item:nth-child(5) {
            animation-delay: 0.5s;
        }

        @keyframes trustReveal {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .trust-icon {
            font-size: 1.1rem;
        }

        .trust-divider {
            width: 1px;
            height: 20px;
            background: rgba(245, 240, 232, 0.1);
        }

        /* ===== FEATURES GRID ===== */
        .features-section {
            padding: 100px 28px;
            background: var(--ink);
        }

        .features-grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .feature-card {
            background: var(--ink-2);
            border: 1px solid rgba(245, 240, 232, 0.06);
            border-radius: 2px;
            padding: 32px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(24px);
            animation: cardReveal 0.5s ease forwards;
        }

        .feature-card:nth-child(1) {
            animation-delay: 0.1s;
        }

        .feature-card:nth-child(2) {
            animation-delay: 0.2s;
        }

        .feature-card:nth-child(3) {
            animation-delay: 0.3s;
        }

        .feature-card:nth-child(4) {
            animation-delay: 0.4s;
        }

        .feature-card:nth-child(5) {
            animation-delay: 0.5s;
        }

        .feature-card:nth-child(6) {
            animation-delay: 0.6s;
        }

        @keyframes cardReveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .feature-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--crimson);
            transform: scaleY(0);
            transition: transform 0.35s;
            transform-origin: bottom;
        }

        .feature-card:hover {
            transform: translateY(-4px);
            border-color: rgba(192, 57, 43, 0.25);
            background: var(--ink-3);
        }

        .feature-card:hover::before {
            transform: scaleY(1);
        }

        .fc-icon {
            width: 52px;
            height: 52px;
            background: rgba(192, 57, 43, 0.1);
            border: 1px solid rgba(192, 57, 43, 0.2);
            border-radius: 2px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            transition: all 0.3s;
        }

        .feature-card:hover .fc-icon {
            background: rgba(192, 57, 43, 0.18);
        }

        .fc-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--ivory);
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .fc-desc {
            font-size: 0.875rem;
            color: var(--ivory-dim);
            line-height: 1.75;
            font-weight: 300;
        }

        /* ===== ARTICLES SECTION ===== */
        .articles-section {
            padding: 100px 28px;
            background: var(--ink-2);
        }

        .articles-inner {
            max-width: 1200px;
            margin: 0 auto;
        }

        .articles-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 28px;
        }

        .article-main {
            background: var(--ink-3);
            border: 1px solid rgba(245, 240, 232, 0.07);
            border-radius: 2px;
            overflow: hidden;
        }

        .article-img-placeholder {
            height: 240px;
            background: linear-gradient(135deg, var(--ink-4), var(--ink-3));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            position: relative;
            overflow: hidden;
        }

        .article-img-placeholder::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                repeating-linear-gradient(45deg,
                    transparent, transparent 40px,
                    rgba(192, 57, 43, 0.03) 40px, rgba(192, 57, 43, 0.03) 41px);
        }

        .article-img-placeholder::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 30%, var(--ink-3));
        }

        .article-body {
            padding: 32px;
        }

        .article-category {
            display: inline-block;
            color: var(--crimson);
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-family: 'Barlow Condensed', sans-serif;
            margin-bottom: 14px;
            border-bottom: 1px solid rgba(192, 57, 43, 0.4);
            padding-bottom: 4px;
        }

        .article-body h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 14px;
            line-height: 1.35;
            color: var(--ivory);
        }

        .article-body p {
            color: var(--ivory-dim);
            font-size: 0.875rem;
            line-height: 1.85;
            margin-bottom: 14px;
            font-weight: 300;
        }

        .article-meta {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 0.75rem;
            color: var(--ivory-dim);
            margin-top: 24px;
            padding-top: 18px;
            border-top: 1px solid rgba(245, 240, 232, 0.06);
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        .meta-dot {
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: var(--crimson);
        }

        .articles-sidebar {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .article-mini {
            background: var(--ink-3);
            border: 1px solid rgba(245, 240, 232, 0.06);
            border-left: 3px solid rgba(192, 57, 43, 0.3);
            padding: 18px 20px;
            transition: all 0.3s;
        }

        .article-mini:hover {
            border-left-color: var(--crimson);
            transform: translateX(3px);
        }

        .article-mini h3 {
            font-family: 'Playfair Display', serif;
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 7px;
            line-height: 1.4;
            color: var(--ivory);
        }

        .article-mini p {
            font-size: 0.78rem;
            color: var(--ivory-dim);
            line-height: 1.65;
            font-weight: 300;
        }

        .article-mini-meta {
            font-size: 0.68rem;
            color: var(--ivory-dim);
            margin-top: 10px;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        /* ===== LICENSE SECTION ===== */
        .license-section {
            padding: 100px 28px;
            background: var(--ink);
        }

        .license-inner {
            max-width: 1200px;
            margin: 0 auto;
        }

        .license-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 70px;
            align-items: center;
        }

        .license-content h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 20px;
            line-height: 1.2;
            color: var(--ivory);
        }

        .license-content p {
            color: var(--ivory-dim);
            line-height: 1.85;
            margin-bottom: 18px;
            font-weight: 300;
        }

        .license-badges {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 32px;
        }

        .license-badge-item {
            display: flex;
            align-items: center;
            gap: 16px;
            background: var(--ink-2);
            border: 1px solid rgba(245, 240, 232, 0.06);
            border-left: 3px solid var(--crimson);
            padding: 16px 20px;
            transition: all 0.3s;
        }

        .license-badge-item:hover {
            background: var(--ink-3);
        }

        .lbi-icon {
            width: 42px;
            height: 42px;
            flex-shrink: 0;
            background: rgba(192, 57, 43, 0.12);
            border: 1px solid rgba(192, 57, 43, 0.25);
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }

        .lbi-text h4 {
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 2px;
            color: var(--ivory);
            font-family: 'Barlow Condensed', sans-serif;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .lbi-text p {
            font-size: 0.75rem;
            color: var(--ivory-dim);
            font-weight: 300;
        }

        .license-visual {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .license-shield {
            position: relative;
            width: 280px;
            height: 320px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .shield-outer {
            position: absolute;
            inset: 0;
            border: 1px solid rgba(192, 57, 43, 0.3);
            border-radius: 50% 50% 40% 40%;
            animation: shieldPulse 3.5s ease-in-out infinite;
        }

        @keyframes shieldPulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
                border-color: rgba(192, 57, 43, 0.3);
            }

            50% {
                transform: scale(1.04);
                opacity: 0.7;
                border-color: rgba(192, 57, 43, 0.6);
            }
        }

        .shield-ring {
            position: absolute;
            border: 1px solid rgba(192, 57, 43, 0.08);
            border-radius: 50%;
            animation: ringExpand 3s ease-out infinite;
        }

        .shield-ring:nth-child(2) {
            width: 320px;
            height: 320px;
            animation-delay: 0s;
        }

        .shield-ring:nth-child(3) {
            width: 380px;
            height: 380px;
            animation-delay: 0.6s;
        }

        .shield-ring:nth-child(4) {
            width: 440px;
            height: 440px;
            animation-delay: 1.2s;
        }

        @keyframes ringExpand {
            0% {
                opacity: 0.3;
                transform: scale(0.85);
            }

            100% {
                opacity: 0;
                transform: scale(1.15);
            }
        }

        .shield-content {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .shield-icon {
            font-size: 4rem;
            margin-bottom: 12px;
            display: block;
        }

        .shield-title {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: 1.2rem;
            color: var(--crimson-bright);
        }

        .shield-sub {
            font-size: 0.75rem;
            color: var(--ivory-dim);
            margin-top: 5px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-family: 'Barlow Condensed', sans-serif;
        }

        /* ===== SECURITY SECTION ===== */
        .security-section {
            padding: 100px 28px;
            background: var(--ink-2);
        }

        .security-inner {
            max-width: 1200px;
            margin: 0 auto;
        }

        .security-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-top: 56px;
        }

        .security-card {
            background: var(--ink-3);
            border: 1px solid rgba(245, 240, 232, 0.05);
            padding: 28px 24px;
            text-align: center;
            transition: all 0.3s;
            border-radius: 2px;
            position: relative;
            overflow: hidden;
        }

        .security-card:hover {
            transform: translateY(-3px);
            border-color: rgba(192, 57, 43, 0.25);
        }

        .security-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--crimson);
            transform: scaleX(0);
            transition: transform 0.3s;
        }

        .security-card:hover::after {
            transform: scaleX(1);
        }

        .sc-number {
            font-family: 'Playfair Display', serif;
            font-size: 2.4rem;
            font-weight: 900;
            color: var(--crimson-bright);
            line-height: 1;
        }

        .sc-title {
            font-size: 0.78rem;
            font-weight: 700;
            margin: 10px 0 6px;
            color: var(--ivory);
            font-family: 'Barlow Condensed', sans-serif;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .sc-desc {
            font-size: 0.78rem;
            color: var(--ivory-dim);
            line-height: 1.6;
            font-weight: 300;
        }

        /* ===== PAYMENTS SECTION ===== */
        .payments-section {
            padding: 100px 28px;
            background: var(--ink);
        }

        .payments-inner {
            max-width: 1200px;
            margin: 0 auto;
        }

        .payment-methods {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-top: 56px;
        }

        .payment-chip {
            background: var(--ink-2);
            border: 1px solid rgba(245, 240, 232, 0.08);
            padding: 11px 22px;
            display: flex;
            align-items: center;
            gap: 9px;
            font-size: 0.8rem;
            font-weight: 700;
            transition: all 0.3s;
            font-family: 'Barlow Condensed', sans-serif;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--ivory-dim);
            border-radius: 2px;
        }

        .payment-chip:hover {
            border-color: rgba(192, 57, 43, 0.5);
            background: rgba(192, 57, 43, 0.07);
            transform: translateY(-2px);
            color: var(--ivory);
        }

        .payment-chip-icon {
            font-size: 1.1rem;
        }

        /* ===== FAQ SECTION ===== */
        .faq-section {
            padding: 100px 28px;
            background: var(--ink-2);
        }

        .faq-inner {
            max-width: 780px;
            margin: 0 auto;
        }

        .faq-list {
            margin-top: 48px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .faq-item {
            background: var(--ink-3);
            border: 1px solid rgba(245, 240, 232, 0.05);
            border-left: 3px solid rgba(192, 57, 43, 0.2);
            overflow: hidden;
            transition: border-color 0.3s;
        }

        .faq-item.active {
            border-left-color: var(--crimson);
        }

        .faq-question {
            padding: 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            user-select: none;
            transition: color 0.3s;
            color: var(--ivory-dim);
        }

        .faq-question:hover {
            color: var(--ivory);
        }

        .faq-item.active .faq-question {
            color: var(--ivory);
        }

        .faq-arrow {
            width: 26px;
            height: 26px;
            flex-shrink: 0;
            background: rgba(192, 57, 43, 0.1);
            border: 1px solid rgba(192, 57, 43, 0.2);
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            transition: all 0.3s;
            color: var(--crimson);
        }

        .faq-item.active .faq-arrow {
            background: var(--crimson);
            color: var(--ivory);
            transform: rotate(180deg);
        }

        .faq-answer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, padding 0.3s;
            padding: 0 24px;
            color: var(--ivory-dim);
            font-size: 0.875rem;
            line-height: 1.85;
            font-weight: 300;
        }

        .faq-item.active .faq-answer {
            max-height: 280px;
            padding-bottom: 20px;
        }

        /* ===== HOW TO SECTION ===== */
        .howto-section {
            padding: 100px 28px;
            background: var(--ink);
        }

        .howto-inner {
            max-width: 1200px;
            margin: 0 auto;
        }

        .steps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 0;
            margin-top: 56px;
            position: relative;
        }

        .steps-grid::before {
            content: '';
            position: absolute;
            top: 40px;
            left: 10%;
            right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--crimson), transparent);
            z-index: 0;
            opacity: 0.4;

        .step-item {
            text-align: center;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

            width: 80px;
            height: 80px;
            background: var(--ink-2);
            border: 1px solid rgba(192, 57, 43, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--crimson-bright);
